<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UniNavigator – Academic Performance</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PDF Generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>
<div id="page-gpa" class="page">

      <h1>GPA Calculator</h1>
      <p class="subtitle">Weighted GPA = Σ(GradePoints × Credits) / Σ(Credits)</p>

      <div class="cards-grid" id="gpa-summary-cards"></div>

      <!-- Goal Planner -->
      <div class="section goal-planner-section">
        <h2>Goal Planner</h2>
        <p class="subtitle small">Enter your target GPA to see what marks you need to achieve it.</p>
        <div class="goal-planner-form">
          <div class="form-group">
            <label>Target GPA</label>
            <input type="number" id="target-gpa-input" step="0.01" min="0" max="4" placeholder="e.g. 3.5">
          </div>
          <div class="form-group">
            <label>Total credits (current + remaining)</label>
            <input type="number" id="total-credits-input" min="1" placeholder="e.g. 120">
          </div>
          <div class="form-group">
            <label>Credits already completed (with grades)</label>
            <input type="number" id="completed-credits-input" min="0" value="0" placeholder="0">
          </div>
          <div class="form-group">
            <label>Current weighted points (grade points × credits already earned)</label>
            <input type="number" id="current-points-input" step="0.01" min="0" value="0" placeholder="0">
          </div>
          <button type="button" id="calculate-goal-btn" class="btn btn-primary">Calculate required marks</button>
        </div>
        <div id="goal-planner-result" class="goal-planner-result hidden"></div>
      </div>

      <div class="section">
        <h2>Add module</h2>
        <form id="gpa-add-form" class="form-inline">
          <div class="form-group flex-1">
            <label>Module name</label>
            <input type="text" name="name" id="gpa-mod-name" required>
          </div>
          <div class="form-group">
            <label>Code</label>
            <input type="text" name="code" id="gpa-mod-code">
          </div>
          <div class="form-group">
            <label>Credits</label>
            <input type="number" name="credits" id="gpa-mod-credits" required>
          </div>
          <div class="form-group">
            <label>Grade</label>
            <select name="grade_letter" id="gpa-mod-grade">
              <option value="">–</option>
              <option value="A+">A+</option>
              <option value="A">A</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B">B</option>
              <option value="B-">B-</option>
              <option value="C+">C+</option>
              <option value="C">C</option>
              <option value="C-">C-</option>
              <option value="D">D</option>
              <option value="E">E</option>
              <option value="F">F</option>
            </select>
          </div>
          <div class="form-group">
            <label>Semester</label>
            <input type="number" name="semester" id="gpa-mod-semester" value="1">
          </div>
          <button type="submit" class="btn btn-primary">Add</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Module</th><th>Code</th><th>Credits</th><th>Grade</th><th></th></tr>
            </thead>
            <tbody id="gpa-modules-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>


</body>
